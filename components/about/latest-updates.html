<section id="executive-intelligence" class="py-16 md:py-24 bg-gray-100 overflow-hidden">
    <div class="container mx-auto px-6">
        <div class="reveal-up text-center max-w-3xl mx-auto mb-4" data-motion="reveal-up">
            <div class="flex items-center justify-center gap-2 mb-3">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-700"></span>
                <span class="text-sm font-bold uppercase tracking-widest text-emerald-800"
                    data-i18n="latest_updates.label">Latest Updates</span>
            </div>
            <h2 class="text-3xl md:text-4xl font-serif font-light text-gray-950 mb-4"
                data-i18n="latest_updates.title">Insights That Drive Better Business Decisions</h2>
            <p class="text-sm text-gray-500 max-w-xl mx-auto leading-relaxed" data-i18n="latest_updates.desc">
                Weekly perspectives, regulatory insights, transaction advisory and strategic business
                intelligence.
            </p>
        </div>
        <!-- Carousel controls: top-right -->
        <div class="flex items-center justify-end gap-2 mb-6 reveal-up latest-carousel-controls" data-motion="reveal-up">
            <button type="button" id="latestPrev" class="latest-ctrl-btn" aria-label="Previous slides">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <button type="button" id="latestPlayPause" class="latest-ctrl-btn" aria-label="Pause carousel">
                <svg class="icon-pause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
                    stroke="none">
                    <rect x="6" y="4" width="4" height="16" rx="1" />
                    <rect x="14" y="4" width="4" height="16" rx="1" />
                </svg>
                <svg class="icon-play" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"
                    stroke="none" style="display:none">
                    <path d="M6 4l14 8-14 8V4z" />
                </svg>
            </button>
            <button type="button" id="latestNext" class="latest-ctrl-btn" aria-label="Next slides">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
        </div>
        <!-- Carousel -->
        <div class="relative reveal-up" data-motion="reveal-up">
            <div id="latestCarousel" class="flex overflow-hidden cursor-grab select-none pb-4">
            </div>
        </div>
    </div>
</section>
