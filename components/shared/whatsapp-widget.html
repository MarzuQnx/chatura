            </path>
        </svg>
        <span class="wa-pulse" aria-hidden="true"></span>
    </button>
    <div id="waPopup" class="wa-popup" role="dialog" aria-modal="false" aria-labelledby="wa-title"
        aria-hidden="true">
        <div class="wa-header">
            <div>
                <p class="wa-eyebrow">CHATURA SUPPORT</p>
                <h2 id="wa-title" class="wa-title">How can we help?</h2>
            </div>
            <button type="button" class="wa-close" id="waClose" aria-label="Close WhatsApp contact options">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round"></path>
                </svg>
            </button>
        </div>
        <p class="wa-intro">Choose the department that best matches your enquiry and we'll connect you directly on
            WhatsApp.</p>
        <div class="wa-options">
            <a href="https://wa.me/6212345678?text=Hi+Chatura%2C+I+need+help+with+general+inquiry." target="_blank"
                rel="noopener noreferrer" class="wa-option">
                <span class="wa-option-icon"><svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path d="M4 12a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round"></path>
                        <rect x="3.5" y="12" width="4" height="7" rx="2" fill="none" stroke="currentColor"
                            stroke-width="1.8"></rect>
                        <rect x="16.5" y="12" width="4" height="7" rx="2" fill="none" stroke="currentColor"
                            stroke-width="1.8"></rect>
                        <path d="M8 20c0 1.1.9 2 2 2h2" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg></span>
                <span class="wa-option-content"><strong>General Inquiry</strong><span>Accounting, Tax &amp;
                        Advisory</span></span>
                <span class="wa-arrow" aria-hidden="true">→</span>
            </a>
            <a href="https://wa.me/6212345678?text=Hi+Chatura%2C+I+need+help+with+business+transfer."
                target="_blank" rel="noopener noreferrer" class="wa-option">
                <span class="wa-option-icon"><svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path d="M12 3 5 6v5c0 4.5 2.7 7.6 7 10 4.3-2.4 7-5.5 7-10V6l-7-3Zm-3 9 2 2 4-4" fill="none"
                            stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                        </path>
                    </svg></span>
                <span class="wa-option-content"><strong>Business Transfer</strong><span>M&amp;A and deal
                        advisory</span></span>
                <span class="wa-arrow" aria-hidden="true">→</span>
            </a>
        </div>
        <div class="wa-notice">
            <strong>CLIENT SUPPORT HOURS</strong>
            <span>Monday – Friday, 9AM – 6PM WIB</span>
        </div>
    </div>
</div>
